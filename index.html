<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wakeboarding Insult Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #0b3b5c 0%, #1b7e9f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      max-width: 600px;
      width: 100%;
      padding: 32px 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    h1 {
      font-size: 2.2rem;
      color: #023047;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h1 span {
      font-size: 2.5rem;
    }

    .subtitle {
      color: #2a5f7a;
      font-weight: 500;
      margin-bottom: 24px;
      font-style: italic;
    }

    .insult-box {
      background: #f0f9ff;
      border: 3px solid #fbbf24;
      border-radius: 24px;
      padding: 28px 20px;
      margin: 20px 0 30px;
      font-size: 1.6rem;
      font-weight: 600;
      line-height: 1.4;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
      color: #022b3a;
      word-break: break-word;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }

    button {
      background: white;
      border: none;
      border-radius: 60px;
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 0 #b45309, 0 8px 16px rgba(0,0,0,0.2);
      transition: all 0.08s linear;
      color: #1e293b;
      border: 2px solid #fbbf24;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #b45309, 0 5px 12px rgba(0,0,0,0.2);
    }

    button.copy-btn {
      background: #2c3e50;
      color: white;
      box-shadow: 0 6px 0 #1a2632;
      border-color: #475569;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #2d5a73;
    }

    .footer a {
      color: #fbbf24;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>
      <span></span> Wake Roast <span></span>
    </h1>

    <!-- Insult display - initially empty, filled by script below -->
    <div class="insult-box" id="insultDisplay"></div>

    <div class="controls">
      <button id="generateBtn">
        <span>🎲</span> Next
      </button>

    </div>

  </div>

"Your approach to that kicker was less 'send it' and more 'send help.'",
"I've seen better line choice in a game of Snakes and Ladders played by blindfolded chimpanzees.",
"That rail hit was so short it should come with a government health warning about premature evacuation.",
"The only thing you've ever hit consistently is rock bottom. And occasionally a buoy. And last Tuesday, a duck."
    ];

    // ----- DOM elements -----
    const insultDisplay = document.getElementById('insultDisplay');
    const generateBtn = document.getElementById('generateBtn');

    // ----- Helper: random insult -----
    function getRandomInsult() {
      const randomIndex = Math.floor(Math.random() * insults.length);
      return insults[randomIndex];
    }

    // ----- Update display with new insult -----
    function showNewInsult() {
      insultDisplay.textContent = getRandomInsult();
    }

    // ----- Set a random insult immediately on page load -----
    // This runs right after the insultDisplay element exists
    showNewInsult();

    // ----- Event listeners -----
    generateBtn.addEventListener('click', showNewInsult);
    copyBtn.addEventListener('click', copyInsultToClipboard);
  </script>
</body>
</html>
